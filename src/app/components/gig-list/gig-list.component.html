@for (g of upcomingGigs; track g.date) {
  <app-gig-item
    [gig]="g"
    class="upcoming"
    (selected)="openGig($event)"
    />
  <hr>
}

@for (g of pastGigs; track g.date) {
  <app-gig-item
    [gig]="g"
    class="past"
    (selected)="openGig($event)"
  />
}

@if (selectedGig) {
  <app-gig-item-overview
    [gig]="selectedGig"
    (close)="closeGig()"
  />
}
